<!--
  REPOSITORY BANNER TEMPLATE
  Copy to a repo's assets/repo-banner.svg and replace the {{TOKENS}}.
  Keep sizing (1200x220) and the color tokens identical across repos
  so every project reads as part of the same visual identity.
-->
<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#0D1220"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="{{ACCENT_1}}"/>
      <stop offset="100%" stop-color="{{ACCENT_2}}"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="{{ACCENT_1}}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="{{ACCENT_1}}" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="220" rx="16" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="1199" height="219" rx="16" fill="none" stroke="#1E2536"/>
  <circle cx="1020" cy="60" r="150" fill="url(#glow)"/>

  <!-- minimal node motif, right side — swap coordinates per project if desired -->
  <g stroke="#242C40" stroke-width="1.2">
    <line x1="880" y1="70" x2="990" y2="110"/>
    <line x1="990" y1="110" x2="1100" y2="60"/>
    <line x1="990" y1="110" x2="1040" y2="170"/>
  </g>
  <circle cx="880" cy="70" r="4" fill="{{ACCENT_1}}"/>
  <circle cx="990" cy="110" r="5.5" fill="{{ACCENT_2}}"/>
  <circle cx="1100" cy="60" r="4" fill="{{ACCENT_1}}"/>
  <circle cx="1040" cy="170" r="4" fill="{{ACCENT_2}}"/>

  <text x="60" y="90" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="url(#titleGrad)">{{PROJECT_NAME}}</text>
  <text x="60" y="124" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#C6CBDA">{{PROJECT_TAGLINE}}</text>
  <text x="60" y="152" font-family="'Consolas', 'SF Mono', monospace" font-size="13" fill="#7DE0F0">{{TECH_TAG_1}} · {{TECH_TAG_2}} · {{TECH_TAG_3}}</text>

  <line x1="60" y1="170" x2="360" y2="170" stroke="#242C40" stroke-width="1"/>
  <text x="60" y="196" font-family="'Consolas', 'SF Mono', monospace" font-size="12" fill="#5B6478">{{ROLE}} · {{YEAR}}</text>
</svg>
