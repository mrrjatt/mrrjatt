<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="55%" stop-color="#0D1220"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
      <animate attributeName="x1" values="0;120;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="620;740;620" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="18" fill="none" stroke="#1E2536" stroke-width="1"/>

  <!-- ambient glow -->
  <circle cx="1000" cy="80" r="180" fill="url(#glow)"/>
  <circle cx="150" cy="260" r="140" fill="url(#glow)" opacity="0.5"/>

  <!-- network / distributed-systems motif (right side) -->
  <g stroke="#242C40" stroke-width="1.2" opacity="0.9">
    <line x1="760" y1="60" x2="880" y2="110"/>
    <line x1="880" y1="110" x2="1010" y2="70"/>
    <line x1="880" y1="110" x2="930" y2="210"/>
    <line x1="930" y1="210" x2="1080" y2="180"/>
    <line x1="930" y1="210" x2="1000" y2="270"/>
    <line x1="1010" y1="70" x2="1130" y2="120"/>
    <line x1="1080" y1="180" x2="1150" y2="230"/>
    <line x1="760" y1="60" x2="820" y2="200"/>
    <line x1="820" y1="200" x2="930" y2="210"/>
  </g>

  <!-- animated pulse traveling along a path -->
  <g>
    <path id="pulsePath1" d="M760 60 L880 110 L1010 70 L1130 120" stroke="url(#lineGrad)" stroke-width="2" fill="none" opacity="0.9"/>
    <circle r="4" fill="#22D3EE" filter="url(#soft)">
      <animateMotion dur="4s" repeatCount="indefinite" path="M760 60 L880 110 L1010 70 L1130 120"/>
    </circle>
    <path id="pulsePath2" d="M880 110 L930 210 L1000 270" stroke="url(#lineGrad)" stroke-width="2" fill="none" opacity="0.7"/>
    <circle r="3.5" fill="#818CF8" filter="url(#soft)">
      <animateMotion dur="5.5s" repeatCount="indefinite" path="M880 110 L930 210 L1000 270"/>
    </circle>
    <path id="pulsePath3" d="M930 210 L1080 180 L1150 230" stroke="url(#lineGrad)" stroke-width="2" fill="none" opacity="0.6"/>
    <circle r="3" fill="#22D3EE" filter="url(#soft)">
      <animateMotion dur="6.5s" repeatCount="indefinite" path="M930 210 L1080 180 L1150 230"/>
    </circle>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="760" cy="60" r="4.5" fill="#22D3EE"/>
    <circle cx="880" cy="110" r="6" fill="#6366F1"/>
    <circle cx="1010" cy="70" r="4" fill="#818CF8"/>
    <circle cx="930" cy="210" r="5.5" fill="#22D3EE"/>
    <circle cx="1080" cy="180" r="4" fill="#6366F1"/>
    <circle cx="1000" cy="270" r="4" fill="#818CF8"/>
    <circle cx="1130" cy="120" r="4" fill="#22D3EE"/>
    <circle cx="1150" cy="230" r="3.5" fill="#6366F1"/>
    <circle cx="820" cy="200" r="3.5" fill="#818CF8"/>
    <g fill="#22D3EE" opacity="0.85">
      <circle cx="880" cy="110" r="10" fill="none" stroke="#22D3EE" stroke-width="1">
        <animate attributeName="r" values="6;16;6" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- left content -->
  <text x="64" y="108" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#titleGrad)">Muhammad Afzaal Ali</text>

  <text x="64" y="148" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#C6CBDA">Senior Full-Stack Engineer · Team Lead · SaaS Architect</text>

  <text x="64" y="176" font-family="'Consolas', 'SF Mono', monospace" font-size="14" fill="#7DE0F0">AI Integration Specialist — building systems that scale</text>

  <!-- divider -->
  <line x1="64" y1="200" x2="420" y2="200" stroke="#242C40" stroke-width="1"/>

  <!-- tag row -->
  <g font-family="'Consolas', 'SF Mono', monospace" font-size="12.5" fill="#9AA3B8">
    <g>
      <rect x="64" y="220" width="88" height="26" rx="6" fill="#121826" stroke="#242C40"/>
      <text x="78" y="237">Node.js</text>
    </g>
    <g>
      <rect x="160" y="220" width="80" height="26" rx="6" fill="#121826" stroke="#242C40"/>
      <text x="174" y="237">Next.js</text>
    </g>
    <g>
      <rect x="248" y="220" width="82" height="26" rx="6" fill="#121826" stroke="#242C40"/>
      <text x="262" y="237">NestJS</text>
    </g>
    <g>
      <rect x="338" y="220" width="70" height="26" rx="6" fill="#121826" stroke="#242C40"/>
      <text x="352" y="237">AWS</text>
    </g>
    <g>
      <rect x="416" y="220" width="98" height="26" rx="6" fill="#121826" stroke="#242C40"/>
      <text x="430" y="237">OpenAI API</text>
    </g>
  </g>

  <text x="64" y="284" font-family="'Consolas', 'SF Mono', monospace" font-size="12.5" fill="#5B6478">4+ years · 20+ production systems · international clients</text>
</svg>
